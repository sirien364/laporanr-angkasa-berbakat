<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PROGUL ANGKASA BERBAKAT</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#444;
    padding:20px;
    color:white;
}

.header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
}

.title{
    font-size:48px;
    font-weight:bold;
}

.container{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.card{
    background:#4973c4;
    border-radius:12px;
    padding:15px;
}

.area{
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

.btn{
    min-width:130px;
    text-align:center;
    padding:14px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    font-size:20px;
    font-weight:bold;
    border:3px solid white;
    transition:0.2s;
}

.btn:hover{
    transform:scale(1.05);
}

.hijau{
    background:#00b140;
}

.merah{
    background:#e60000;
}

@media(max-width:700px){

    .title{
        font-size:28px;
        text-align:center;
    }

    .btn{
        width:100%;
    }

}

</style>
</head>

<body>

<div class="header">

    <!-- GANTI LOGO -->
    <img class="logo"
         src="ab.jpg">

    <div class="title">
        PROGUL ANGKASA BERBAKAT
    </div>

</div>

<div class="container" id="container">
</div>

<script>

// ===============================
// LINK GOOGLE SHEET JSON
// ===============================

// GANTI DENGAN LINK WEB APP GOOGLE APPS SCRIPT
const API_URL = "https://script.google.com/macros/s/AKfycbwUvHyGb2XJQ7jAaPT5KA7x8Ziqx7G3BHV-eO6z4AKgJNvhPWJ5GQ4B98OpFTflL0soGw/exec?sheet=DATA1";

// ===============================
// AMBIL DATA
// ===============================

fetch(API_URL)
.then(response => response.json())
.then(data => tampilkanData(data));

function tampilkanData(data){

    const container = document.getElementById("container");

    // GROUP BERDASARKAN AREA
    const grouped = {};

    data.forEach(item => {

        if(!grouped[item.area]){
            grouped[item.area] = [];
        }

        grouped[item.area].push(item);

    });

    // LOOP AREA
    for(const area in grouped){

        const card = document.createElement("div");
        card.className = "card";

        const title = document.createElement("div");
        title.className = "area";
        title.innerText = area;

        const buttons = document.createElement("div");
        buttons.className = "buttons";

        grouped[area].forEach(sekolah => {

            const a = document.createElement("a");

            a.className = "btn";

            a.innerText = sekolah.nama;

            // JIKA ADA LINK
            if(sekolah.link && sekolah.link !== ""){

                a.classList.add("hijau");

                a.href = sekolah.link;

                a.target = "_blank";

            }else{

                a.classList.add("merah");

            }

            buttons.appendChild(a);

        });

        card.appendChild(title);
        card.appendChild(buttons);

        container.appendChild(card);

    }

}

</script>

</body>
</html>
