<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PROGUL ANGKASA BERBAKAT</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#444;
    padding:20px;
    color:white;
}

.header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
}

.title{
    font-size:48px;
    font-weight:bold;
}

.legend{
    display:flex;
    justify-content:center;
    gap:25px;
    margin-bottom:25px;
    flex-wrap:wrap;
    font-size:18px;
    font-weight:bold;
}

.legend-item{
    display:flex;
    align-items:center;
    gap:8px;
}

.dot{
    width:18px;
    height:18px;
    border-radius:50%;
}

.dot-green{
    background:#00b140;
}

.dot-yellow{
    background:#ffc107;
}

.dot-red{
    background:#e60000;
}

.container{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.card{
    background:#4973c4;
    border-radius:12px;
    padding:15px;
}

.area{
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

.btn{
    min-width:130px;
    text-align:center;
    padding:14px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    font-size:20px;
    font-weight:bold;
    border:3px solid white;
    transition:0.2s;
}

.btn:hover{
    transform:scale(1.05);
}

.hijau{
    background:#00b140;
}

.kuning{
    background:#ffc107;
    color:#000;
}

.merah{
    background:#e60000;
}

.loading{
    text-align:center;
    font-size:24px;
}

.error{
    text-align:center;
    color:#ffb3b3;
    font-size:24px;
}

@media(max-width:700px){

    .title{
        font-size:28px;
        text-align:center;
    }

    .btn{
        width:100%;
    }

}

</style>

</head>

<body>

<div class="header">

    <img class="logo"
         src="ab.jpg">

    <div class="title">
        PROGUL ANGKASA BERBAKAT
    </div>

</div>

<div class="legend">

    <div class="legend-item">
        <div class="dot dot-green"></div>
        Lengkap
    </div>

    <div class="legend-item">
        <div class="dot dot-yellow"></div>
        Kurang
    </div>

    <div class="legend-item">
        <div class="dot dot-red"></div>
        Belum Mengirim
    </div>

</div>

<div class="container" id="container">

    <div class="loading">
        Loading...
    </div>

</div>

<script>

// GANTI DENGAN URL WEB APP ANDA
const API_URL =
"https://script.google.com/macros/s/AKfycbxJ1S6HMkoL-aXMzZjc5j_znbXaNK0v3IGunAIyHUuGIIfzUy4M3NyHiQXZBpBYrHQ7OQ/exec?sheet=DATA1";

fetch(API_URL)

.then(response => response.json())

.then(data => tampilkanData(data))

.catch(error => {

    console.log(error);

    document.getElementById("container").innerHTML =
    '<div class="error">Gagal mengambil data</div>';

});

function tampilkanData(data){

    const container = document.getElementById("container");

    container.innerHTML = "";

    const grouped = {};

    data.forEach(item => {

        if(!grouped[item.area]){

            grouped[item.area] = [];

        }

        grouped[item.area].push(item);

    });

    for(const area in grouped){

        const card = document.createElement("div");
        card.className = "card";

        const title = document.createElement("div");
        title.className = "area";
        title.innerText = area;

        const buttons = document.createElement("div");
        buttons.className = "buttons";

        grouped[area].forEach(sekolah => {

            const a = document.createElement("a");

            a.className = "btn";

            a.innerText = sekolah.nama;

            const link = (sekolah.link || "").trim();

            const ket = (sekolah.keterangan || "")
                        .trim()
                        .toUpperCase();

            // MERAH
            if(link === ""){

                a.classList.add("merah");

                a.href = "#";

            }

            // HIJAU
            else if(ket === "LENGKAP"){

                a.classList.add("hijau");

                a.href = link;

                a.target = "_blank";

            }

            // KUNING
            else{

                a.classList.add("kuning");

                a.href = link;

                a.target = "_blank";

            }

            buttons.appendChild(a);

        });

        card.appendChild(title);

        card.appendChild(buttons);

        container.appendChild(card);

    }

}

</script>

</body>
</html>
