<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Saya</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:linear-gradient(135deg,#111,#222);
        color:white;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:400px;
        text-align:center;
    }

    .profile-img{
        width:120px;
        height:120px;
        border-radius:50%;
        object-fit:cover;
        border:4px solid white;
        margin-bottom:15px;
    }

    h1{
        font-size:28px;
        margin-bottom:10px;
    }

    p{
        color:#ccc;
        margin-bottom:30px;
    }

    .link{
        display:block;
        background:white;
        color:#111;
        text-decoration:none;
        padding:15px;
        margin:12px 0;
        border-radius:15px;
        font-weight:bold;
        transition:0.3s;
    }

    .link:hover{
        transform:scale(1.05);
        background:#25D366;
        color:white;
    }

    .footer{
        margin-top:25px;
        font-size:13px;
        color:#888;
    }
</style>
</head>

<body>

<div class="container">

    <!-- FOTO PROFIL -->
    <img src="https://i.imgur.com/6VBx3io.png" class="profile-img">

    <!-- NAMA -->
    <h1>Nama Anda</h1>

    <!-- DESKRIPSI -->
    <p>Selamat datang di halaman link saya</p>

    <!-- TOMBOL LINK -->
    <a class="link" href="https://wa.me/6281234567890" target="_blank">
        WhatsApp
    </a>

    <a class="link" href="https://instagram.com/" target="_blank">
        Instagram
    </a>

    <a class="link" href="https://youtube.com/" target="_blank">
        YouTube
    </a>

    <a class="link" href="https://facebook.com/" target="_blank">
        Facebook
    </a>

    <div class="footer">
        © 2026 - Dibuat dengan HTML
    </div>

</div>

</body>
</html>
